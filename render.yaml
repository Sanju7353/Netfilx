# One-click deploy config for Render.com (free tier).
# 1. Push this project to a GitHub repo.
# 2. On render.com -> New -> Blueprint -> pick the repo. Done.
services:
  # URL becomes https://my-favorite-person-musku.onrender.com
  # (web addresses can't contain spaces/emoji — the pretty name shows in the
  #  link preview + home-screen icon instead).
  - type: web
    name: my-favorite-person-musku
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
